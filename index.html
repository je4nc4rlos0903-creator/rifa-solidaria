<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Rifa Solidária</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

.container{
margin-top:100px;
}

button{
padding:15px 30px;
font-size:18px;
background:#28a745;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Rifa Solidária</h1>

<h2>Prêmio: R$500</h2>

<p>Valor de cada número: R$5</p>

<p id="disponiveis">Carregando números...</p>

<br>

<a href="comprar.html">
<button>Comprar Rifa</button>
</a>

</div>

<script>

const SUPABASE_URL = "https://qswajeisicdtsmmqokna.supabase.co";

const SUPABASE_KEY = "sb_publishable_7VLK-dHs3ybJKV2eBcS00Q_RzwvrmD2";

async function carregarDisponiveis(){

const response = await fetch(
SUPABASE_URL+"/rest/v1/numeros_rifa?status=eq.disponivel&select=numero",
{
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY
}
}
);

const data = await response.json();

document.getElementById("disponiveis").innerText =
"Números disponíveis: "+data.length;

}

carregarDisponiveis();

</script>

</body>
</html>
