<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Rifa Solidária</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:100px;
  text-align:center;

  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url("fundo.jpg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: white;
}

.container{
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.5);
  padding:40px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
  font-size:40px;
  margin-bottom:20px;
}

p{
  font-size:18px;
  margin-bottom:30px;
}

button{
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background: linear-gradient(45deg, #00ff88, #00ccff);
  color:black;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px #00ff88;
}

</style>

</head>
<body>

<div class="container">
  <h1>Rifa Solidária 🎯</h1>
  <p>Escolha seus números e participe!</p>

  <button onclick="irComprar()">Comprar Agora</button>
</div>

<script>
function irComprar(){
  window.location.href = "comprar.html";
}
</script>

</body>
</html>
