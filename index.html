<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Rifa Solidária</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:80px;
  text-align:center;

  background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
              url("fundo.jpg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: white;
}

.container{
  backdrop-filter: blur(12px);
  background: rgba(0,0,0,0.55);
  padding:50px;
  border-radius:25px;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
  max-width:400px;
}

h1{
  font-size:38px;
  margin-bottom:10px;
}

.sub{
  font-size:16px;
  margin-bottom:25px;
  opacity:0.8;
}

.info{
  text-align:left;
  margin-bottom:30px;
}

.info p{
  margin:8px 0;
  font-size:18px;
}

.destaque{
  color:#00ff88;
  font-weight:bold;
}

button{
  width:100%;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background: linear-gradient(45deg, #00ff88, #00ccff);
  color:black;
  cursor:pointer;
  transition:0.3s;
  font-weight:bold;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #00ff88;
}

button:active{
  transform:scale(0.97);
}

</style>

</head>
<body>

<div class="container">

  <h1>Rifa Solidária 🎯</h1>
  <p class="sub">Participe e concorra a um prêmio incrível!</p>

  <div class="info">
    <p>📅 Sorteio: <span class="destaque">04/04</span></p>
    <p>💰 Prêmio: <span class="destaque">R$ 500</span></p>
    <p>🎟️ Valor por número: <span class="destaque">R$ 5</span></p>
  </div>

  <button onclick="irComprar()">🎯 Comprar Rifa</button>

</div>

<script>
function irComprar(){
  window.location.href = "comprar.html";
}
</script>

</body>
</html>
