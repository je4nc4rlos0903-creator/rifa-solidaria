<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Comprar Rifa</title>

<style>
body{font-family:Arial;text-align:center}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}
.num{padding:10px;border:1px solid #000;cursor:pointer}
.selecionado{background:green;color:white}
.indisponivel{background:red;color:white}
</style>

</head>
<body>

<h1>Escolha seus números</h1>

<label>
  <input type="checkbox" id="filtro" onchange="render()">
  Mostrar apenas disponíveis
</label>

<div id="grid" class="grid"></div>

<h2 id="resumo"></h2>

<button onclick="pagar()">Pagar</button>

<script>

const SUPABASE_URL = "https://qswajeisicdtsmmqokna.supabase.co";
const SUPABASE_KEY = "sb_publishable_7VLK-dHs3ybJKV2eBcS00Q_RzwvrmD2";

let selecionados = [];
let todosNumeros = [];

// BUSCAR NÚMEROS
fetch(`${SUPABASE_URL}/rest/v1/numeros_rifa?select=*`, {
  headers:{
    apikey: SUPABASE_KEY,
    Authorization:"Bearer "+SUPABASE_KEY
  }
})
.then(res=>res.json())
.then(data=>{
  todosNumeros = data;
  render();
});

// RENDERIZAR
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const apenasDisponiveis = document.getElementById("filtro").checked;

  todosNumeros.forEach(n => {

    // FILTRO
    if(apenasDisponiveis && n.status !== "disponivel") return;

    const div = document.createElement("div");
    div.innerText = n.numero;
    div.classList.add("num");

    // DISPONÍVEL
    if(n.status === "disponivel"){

      div.onclick = ()=>{
        div.classList.toggle("selecionado");

        if(selecionados.includes(n.numero)){
          selecionados = selecionados.filter(x=>x!==n.numero);
        } else {
          selecionados.push(n.numero);
        }

        atualizar();
      }

    } else {
      div.classList.add("indisponivel");
    }

    grid.appendChild(div);

  });
}

// ATUALIZAR RESUMO
function atualizar(){
  document.getElementById("resumo").innerText =
  "Selecionados: "+selecionados.join(", ")+
  " | Total: R$"+(selecionados.length*5);
}

// PAGAMENTO
async function pagar(){

  if(selecionados.length === 0){
    alert("Escolha um número!");
    return;
  }

  // RESERVAR NÚMEROS
  for(let num of selecionados){
    await fetch(`${SUPABASE_URL}/rest/v1/numeros_rifa?numero=eq.${num}`,{
      method:"PATCH",
      headers:{
        "Content-Type":"application/json",
        apikey: SUPABASE_KEY,
        Authorization:"Bearer "+SUPABASE_KEY
      },
      body: JSON.stringify({status:"reservado"})
    });
  }

  // CHAMAR API DE PAGAMENTO
  const res = await fetch("/api/pagar",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      numeros: selecionados,
      total: selecionados.length*5
    })
  });

  const data = await res.json();

  window.location.href = data.init_point;
}

</script>

</body>
</html>
