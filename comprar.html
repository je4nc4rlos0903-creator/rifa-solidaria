<div class="grid" id="numeros"></div>

<script>

async function carregarNumeros(){

const response = await fetch("/api/listar-numeros");

const numeros = await response.json();

const container = document.getElementById("numeros");

numeros.forEach(n=>{

let div = document.createElement("div");

div.innerText = n.numero;

div.className = n.status=="pago" ? "numero vendido":"numero";

if(n.status=="disponivel"){

div.onclick = async ()=>{

const r = await fetch("/api/criar-pagamento");

const d = await r.json();

window.location.href = d.link;

};

}

container.appendChild(div);

});

}

carregarNumeros();

</script>
