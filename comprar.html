<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Comprar Rifa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
              url("fundo.jpg");
  background-size: cover;
  color:white;
  text-align:center;
  padding:20px;
}

h1{
  margin-bottom:10px;
}

input{
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
  width:200px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background: linear-gradient(45deg, #00ff88, #00ccff);
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:20px;
}

.numero{
  width:60px;
  height:60px;
  margin:5px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  cursor:pointer;
  background:#222;
}

.numero.selecionado{
  background:#00ff88;
  color:black;
}
</style>
</head>

<body>

<h1>🎯 Escolha seus números</h1>

<input type="text" id="nome" placeholder="Seu nome"><br>
<input type="text" id="telefone" placeholder="Seu telefone"><br>

<div class="grid" id="grid"></div>

<button onclick="pagar()" id="btnPagar">💳 Pagar</button>

<script>
// 🔗 CONFIGURAÇÃO SUPABASE (JÁ PREENCHIDO PRA VOCÊ)
const supabase = window.supabase.createClient(
  "https://qswajeisicdtsmmqokna.supabase.co",
  "sb_publishable_7VLK-dHs3ybJKV2eBcS00Q_RzwvrmD2"
);

let numerosSelecionados = [];

// 🔥 carregar números disponíveis
async function carregar(){
  const { data } = await supabase
    .from("rifa")
    .select("*")
    .eq("status", "disponivel");

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(n => {
    const div = document.createElement("div");
    div.className = "numero";
    div.innerText = n.numero;

    div.onclick = () => selecionar(n.numero, div);

    grid.appendChild(div);
  });
}

// selecionar número
function selecionar(num, el){
  if(numerosSelecionados.includes(num)){
    numerosSelecionados = numerosSelecionados.filter(n => n !== num);
    el.classList.remove("selecionado");
  }else{
    numerosSelecionados.push(num);
    el.classList.add("selecionado");
  }
}

// 💳 PAGAMENTO
async function pagar(){
  const nome = document.getElementById("nome").value;
  const telefone = document.getElementById("telefone").value;

  if(!nome || numerosSelecionados.length === 0){
    alert("Preencha nome e escolha números!");
    return;
  }

  // salvar para usar depois no sucesso.html
  localStorage.setItem("nome", nome);
  localStorage.setItem("numeros", JSON.stringify(numerosSelecionados));

  // loading
  const btn = document.getElementById("btnPagar");
  btn.innerText = "⏳ Processando...";
  btn.disabled = true;

  // reservar números
  await supabase
    .from("rifa")
    .update({
      status: "reservado",
      nome: nome,
      telefone: telefone
    })
    .in("numero", numerosSelecionados);

  // criar pagamento
  const res = await fetch("/api/pagar", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      nome,
      telefone,
      numeros: numerosSelecionados
    })
  });

  const data = await res.json();

  // redirecionar pro pagamento
  window.location.href = data.init_point;
}

carregar();
</script>

</body>
</html>
