<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Comprar Rifa</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  min-height:100vh;
  text-align:center;
  padding:30px;

  background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
              url("fundo.jpg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: white;
}

.container{
  backdrop-filter: blur(12px);
  background: rgba(0,0,0,0.55);
  padding:30px;
  border-radius:20px;
  max-width:900px;
  margin:auto;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

h1{
  margin-bottom:20px;
}

input{
  padding:12px;
  margin:10px;
  width:200px;
  border-radius:10px;
  border:none;
  outline:none;
  font-size:16px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:8px;
  margin-top:20px;
}

.num{
  padding:12px;
  border-radius:10px;
  background: rgba(255,255,255,0.1);
  cursor:pointer;
  transition:0.2s;
}

.num:hover{
  background: rgba(255,255,255,0.3);
}

.selecionado{
  background:#00ff88;
  color:black;
  font-weight:bold;
}

#resumo{
  margin-top:20px;
  font-size:18px;
}

button{
  margin-top:20px;
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background: linear-gradient(45deg, #00ff88, #00ccff);
  color:black;
  cursor:pointer;
  transition:0.3s;
  font-weight:bold;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #00ff88;
}

</style>

</head>
<body>

<div class="container">

  <h1>Escolha seus números 🎯</h1>

  <input type="text" id="nome" placeholder="Seu nome">
  <input type="text" id="telefone" placeholder="Seu telefone">

  <div id="grid" class="grid"></div>

  <h2 id="resumo"></h2>

  <button onclick="pagar()">💰 Pagar</button>

</div>

<script>

const SUPABASE_URL = "https://qswajeisicdtsmmqokna.supabase.co";
const SUPABASE_KEY = "sb_publishable_7VLK-dHs3ybJKV2eBcS00Q_RzwvrmD2";

let selecionados = [];

// BUSCAR NÚMEROS DISPONÍVEIS
fetch(`${SUPABASE_URL}/rest/v1/numeros_rifa?status=eq.disponivel`, {
  headers:{
    apikey: SUPABASE_KEY,
    Authorization:"Bearer "+SUPABASE_KEY
  }
})
.then(res => res.json())
.then(data => {

  const grid = document.getElementById("grid");

  data.forEach(n => {

    const div = document.createElement("div");
    div.innerText = n.numero;
    div.classList.add("num");

    div.onclick = ()=>{
      div.classList.toggle("selecionado");

      if(selecionados.includes(n.numero)){
        selecionados = selecionados.filter(x=>x!==n.numero);
      } else {
        selecionados.push(n.numero);
      }

      atualizar();
    }

    grid.appendChild(div);

  });

});

// RESUMO
function atualizar(){
  document.getElementById("resumo").innerText =
    "Selecionados: " + selecionados.join(", ") +
    " | Total: R$" + (selecionados.length * 5);
}

// PAGAMENTO
async function pagar(){

  const nome = document.getElementById("nome").value;
  const telefone = document.getElementById("telefone").value;

  if(!nome){
    alert("Digite seu nome!");
    return;
  }

  if(!telefone){
    alert("Digite seu telefone!");
    return;
  }

  if(selecionados.length === 0){
    alert("Escolha um número!");
    return;
  }

  try {

    for(let num of selecionados){

      await fetch(`${SUPABASE_URL}/rest/v1/numeros_rifa?numero=eq.${num}`,{
        method:"PATCH",
        headers:{
          "Content-Type":"application/json",
          apikey: SUPABASE_KEY,
          Authorization:"Bearer "+SUPABASE_KEY
        },
        body: JSON.stringify({
          status:"reservado",
          nome: nome,
          telefone: telefone
        })
      });

    }

    const res = await fetch("/api/pagar",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        numeros: selecionados,
        nome: nome,
        telefone: telefone
      })
    });

    const data = await res.json();

    if(data.init_point){
      window.location.href = data.init_point;
    } else {
      alert("Erro ao gerar pagamento");
    }

  } catch (e){
    console.error(e);
    alert("Erro no pagamento");
  }

}

</script>

</body>
</html>
