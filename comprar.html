<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Comprar Rifa</title>

<style>
body{font-family:Arial;text-align:center}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}
.num{padding:10px;border:1px solid #000;cursor:pointer}
.selecionado{background:green;color:white}
</style>

</head>
<body>

<h1>Escolha seus números</h1>

<input type="text" id="nome" placeholder="Seu nome">
<br><br>
<input type="text" id="telefone" placeholder="Seu telefone">
<br><br>

<div id="grid" class="grid"></div>

<h2 id="resumo"></h2>

<button onclick="pagar()">Pagar</button>

<script>

const SUPABASE_URL = "https://qswajeisicdtsmmqokna.supabase.co";
const SUPABASE_KEY = "sb_publishable_7VLK-dHs3ybJKV2eBcS00Q_RzwvrmD2";

let selecionados = [];

// BUSCAR NÚMEROS COM EXPIRAÇÃO
fetch(`${SUPABASE_URL}/rest/v1/numeros_rifa?select=*`, {
  headers:{
    apikey: SUPABASE_KEY,
    Authorization:"Bearer "+SUPABASE_KEY
  }
})
.then(res=>res.json())
.then(data=>{
  const grid = document.getElementById("grid");
  const agora = new Date();

  data.forEach(n => {

    let disponivel = false;

    if(n.status === "disponivel"){
      disponivel = true;
    }

    if(n.status === "reservado" && n.tempo_reserva){
      const tempo = new Date(n.tempo_reserva);
      const diff = (agora - tempo) / 1000 / 60;

      if(diff > 10){
        disponivel = true;
      }
    }

    if(!disponivel) return;

    const div = document.createElement("div");
    div.innerText = n.numero;
    div.classList.add("num");

    div.onclick = ()=>{
      div.classList.toggle("selecionado");

      if(selecionados.includes(n.numero)){
        selecionados = selecionados.filter(x=>x!==n.numero);
      } else {
        selecionados.push(n.numero);
      }

      atualizar();
    }

    grid.appendChild(div);

  });
});

// RESUMO
function atualizar(){
  document.getElementById("resumo").innerText =
  "Selecionados: "+selecionados.join(", ") +
  " | Total: R$"+(selecionados.length*5);
}

// PAGAMENTO
async function pagar(){

  try {

    const nome = document.getElementById("nome").value;
    const telefone = document.getElementById("telefone").value;

    if(!nome){
      alert("Digite seu nome!");
      return;
    }

    if(!telefone){
      alert("Digite seu telefone!");
      return;
    }

    if(selecionados.length === 0){
      alert("Escolha um número!");
      return;
    }

    const agora = new Date().toISOString();

    // RESERVAR
    for(let num of selecionados){
      await fetch(`${SUPABASE_URL}/rest/v1/numeros_rifa?numero=eq.${num}&status=eq.disponivel`,{
        method:"PATCH",
        headers:{
          "Content-Type":"application/json",
          apikey: SUPABASE_KEY,
          Authorization:"Bearer "+SUPABASE_KEY
        },
        body: JSON.stringify({
          status:"reservado",
          nome: nome,
          telefone: telefone,
          tempo_reserva: agora
        })
      });
    }

    const res = await fetch("/api/pagar",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        numeros: selecionados,
        nome: nome,
        telefone: telefone
      })
    });

    const data = await res.json();

    if(!data.init_point){
      alert("Erro ao gerar pagamento");
      return;
    }

    window.location.href = data.init_point;

  } catch (e) {
    console.error(e);
    alert("Erro ao pagar!");
  }

}

</script>

</body>
</html>
